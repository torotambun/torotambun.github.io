const tbody = document.getElementById('tbody');
const searchInput = document.getElementById('search');
const resultsBar = document.getElementById('results-bar');
const noResults = document.getElementById('no-results');
const totalBadge = document.getElementById('total-badge');
const backTop = document.getElementById('back-top');

let activeYear = 'all';
let searchTerm = '';

// Build rows once
DATA.forEach((a, i) => {
  const tr = document.createElement('tr');
  tr.dataset.year = a.date.slice(0,4);
  tr.dataset.title = a.title.toLowerCase();
  tr.innerHTML = `<td class="col-date">${a.date}</td><td class="col-title"><a href="${a.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(a.title)}</a></td>`;
  tbody.appendChild(tr);
});

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filter() {
  const rows = tbody.querySelectorAll('tr');
  let visible = 0;
  rows.forEach(tr => {
    const yearOk = activeYear === 'all' || tr.dataset.year === activeYear;
    const titleOk = !searchTerm || tr.dataset.title.includes(searchTerm);
    if (yearOk && titleOk) { tr.classList.remove('hidden'); visible++; }
    else { tr.classList.add('hidden'); }
  });
  resultsBar.textContent = `Showing ${visible} of ${DATA.length} articles`;
  noResults.style.display = visible === 0 ? 'block' : 'none';
}

document.getElementById('year-select').addEventListener('change', e => {
  activeYear = e.target.value;
  filter();
});

searchInput.addEventListener('input', () => {
  searchTerm = searchInput.value.toLowerCase().trim();
  filter();
});

// Back to top
document.addEventListener('DOMContentLoaded', () => {
  document.addEventListener('scroll', () => {
    const y = document.documentElement.scrollTop || document.body.scrollTop;
    backTop.style.display = y > 300 ? 'block' : 'none';
  }, {passive:true});
});
</script>
